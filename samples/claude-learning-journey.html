            {/* Level Tabs */}
            <div style={{ display: "flex", gap: "6px", marginBottom: "20px" }}>
              {tool.levels.map((l, i) => (
                <button key={i}
                  onClick={() => { setActiveLevel(i); setExpandedTask(null); }}
                  style={{
                    background: activeLevel === i ? "#077FA9" : "#fff",
                    color: activeLevel === i ? "#fff" : "#53585F",
                    border: `1px solid ${activeLevel === i ? "#077FA9" : "#C4C7CB"}`,
                    borderRadius: "4px", padding: "7px 16px",
                    fontSize: "11px", fontWeight: "700", cursor: "pointer",
                    fontFamily: '"Tahoma","Geneva",sans-serif', letterSpacing: "0.05em",
                  }}>
                  {l.badge} · {l.level}
                </button>
              ))}
            </div>

            {/* Level Info Card */}
            <div style={{ background: "#EBF7FA", border: "1px solid #AAE0E8", borderLeft: "4px solid #077FA9", borderRadius: "6px", padding: "16px 20px", marginBottom: "20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: "10px", fontWeight: "700", color: "#077FA9", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: "5px" }}>{levelData.duration}</div>
                <div style={{ fontSize: "13px", color: "#53585F" }}><strong>Ziel:</strong> {levelData.goal}</div>
              </div>
              <div style={{ background: "#077FA9", color: "#fff", borderRadius: "4px", padding: "6px 12px", fontSize: "11px", fontWeight: "700", whiteSpace: "nowrap", marginLeft: "16px" }}>
                {levelData.tasks.length} Übungen
              </div>
            </div>

            {/* Task Cards */}
            <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
              {levelData.tasks.map((task, ti) => {
                const key = `${activeTool}-${activeLevel}-${ti}`;
                const isExpanded = expandedTask === key;
                const isDone = completedTasks[key];
                return (
                  <div key={ti} style={{ background: "#fff", border: `1px solid ${isDone ? "#27864A" : "#C4C7CB"}`, borderRadius: "6px", overflow: "hidden", transition: "border-color 0.2s" }}>
                    <div onClick={() => setExpandedTask(isExpanded ? null : key)}
                      style={{ padding: "16px 18px", cursor: "pointer", display: "flex", alignItems: "center", gap: "14px" }}>
                      <button
                        onClick={(e) => { e.stopPropagation(); toggleComplete(key); }}
                        style={{ width: "22px", height: "22px", borderRadius: "50%", border: `2px solid ${isDone ? "#27864A" : "#C4C7CB"}`, background: isDone ? "#27864A" : "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: "11px", color: "#fff", fontWeight: "700" }}>
                        {isDone ? "✓" : ""}
                      </button>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: "14px", fontWeight: "700", color: isDone ? "#27864A" : "#055F7D", marginBottom: "3px" }}>{task.title}</div>
                        <div style={{ fontSize: "11px", color: "#7F7F7F" }}>⏱ {task.time}</div>
                      </div>
                      <div style={{ color: "#C4C7CB", fontSize: "11px", fontWeight: "700" }}>{isExpanded ? "▲" : "▼"}</div>
                    </div>

                    {isExpanded && (
                      <div style={{ borderTop: "1px solid #F0F2F4", padding: "18px 20px", background: "#FAFBFC" }}>
                        <div style={{ fontSize: "10px", fontWeight: "700", color: "#077FA9", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: "10px" }}>Beispiel-Prompt</div>
                        <div style={{ background: "#fff", border: "1px solid #C4C7CB", borderRadius: "4px", padding: "14px 16px", fontSize: "12px", color: "#53585F", lineHeight: "1.7", whiteSpace: "pre-wrap", fontFamily: '"Tahoma","Geneva",sans-serif' }}>
                          {task.prompt}
                        </div>
                        <div style={{ marginTop: "12px", background: "#EBF7FA", border: "1px solid #AAE0E8", borderRadius: "4px", padding: "10px 14px", fontSize: "12px", color: "#055F7D" }}>
                          <strong>Lernziel:</strong> {task.learn}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Tips */}
            <div style={{ marginTop: "36px", background: "#fff", border: "1px solid #C4C7CB", borderRadius: "6px", padding: "24px" }}>
              <div style={{ fontSize: "10px", fontWeight: "700", color: "#055F7D", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: "16px" }}>
                Goldene Prompting-Regeln
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                {tips.map((tip, i) => (
                  <div key={i} style={{ display: "flex", gap: "12px", padding: "12px", background: "#F4F6F8", borderRadius: "4px", alignItems: "flex-start" }}>
                    <span style={{ background: "#055F7D", color: "#fff", borderRadius: "3px", padding: "2px 6px", fontSize: "10px", fontWeight: "700", flexShrink: 0 }}>{tip.icon}</span>
                    <span style={{ fontSize: "11px", color: "#53585F", lineHeight: "1.6" }}>{tip.text}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Footer */}
            <div style={{ textAlign: "center", padding: "24px 0 8px", fontSize: "10px", color: "#C4C7CB", letterSpacing: "0.08em" }}>
              itonic advisors · Claude Learning Journey · Unternehmensberatung & Projektmanagement
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
